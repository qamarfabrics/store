<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Qamar Fabrics</title>
<meta name="description" content="Get in touch with Qamar Fabrics for order questions, bulk enquiries, or fabric advice.">
<link rel="canonical" href="https://YOUR-USERNAME.github.io/qamar-fabrics/contact.html">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="qf-header"></div>

<main id="main">
  <div class="container"><nav class="breadcrumb"><a href="index.html">Home</a> / Contact</nav></div>

  <section class="container" style="max-width:640px;padding:24px 0 70px;">
    <h1>Contact Us</h1>
    <p style="color:var(--ink-600);">Order questions, bulk/wholesale enquiries, or just want fabric advice — send a message and we'll reply by email.</p>

    <form id="contactForm" style="margin-top:24px;">
      <div class="form-field"><label for="cName">Name</label><input id="cName" required></div>
      <div class="form-field"><label for="cEmail">Email</label><input id="cEmail" type="email" required></div>
      <div class="form-field"><label for="cMsg">Message</label><textarea id="cMsg" rows="5" required></textarea></div>
      <button class="btn btn-primary" type="submit">Send Message</button>
      <p id="contactStatus" style="margin-top:12px;color:var(--ink-600);font-size:.9rem;"></p>
    </form>

    <div class="selvage" style="margin:36px 0;"></div>
    <h3>Other ways to reach us</h3>
    <p style="color:var(--ink-600);">WhatsApp / Phone: +92-3XX-XXXXXXX &nbsp;·&nbsp; Email: hello@qamarfabrics.example &nbsp;·&nbsp; Lahore, Pakistan</p>
  </section>
</main>

<div id="qf-footer"></div>

<script type="module">
  import { injectLayout, toast } from "./assets/js/components.js";
  import { db, collection, addDoc, serverTimestamp } from "./assets/js/firebase-config.js";

  injectLayout();

  document.getElementById("contactForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const statusEl = document.getElementById("contactStatus");
    statusEl.textContent = "Sending…";
    try {
      await addDoc(collection(db, "messages"), {
        name: document.getElementById("cName").value,
        email: document.getElementById("cEmail").value,
        message: document.getElementById("cMsg").value,
        createdAt: serverTimestamp()
      });
      statusEl.textContent = "Message sent — we'll reply by email soon.";
      e.target.reset();
    } catch (err) {
      console.error(err);
      statusEl.textContent = "Couldn't send — check your Firebase setup and try again.";
    }
  });
</script>
</body>
</html>
