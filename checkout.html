<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Qamar Fabrics</title>
<meta name="robots" content="noindex, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="qf-header"></div>

<main id="main">
  <div class="container"><nav class="breadcrumb"><a href="index.html">Home</a> / <a href="cart.html">Cart</a> / Checkout</nav></div>
  <section class="container" style="padding:20px 0 40px;"><h1>Checkout</h1></section>

  <section class="container cart-layout" id="checkoutRoot">
    <form id="checkoutForm">
      <h3 style="margin-top:0;">Delivery details</h3>
      <div class="form-grid">
        <div class="form-field"><label for="fullName">Full name</label><input id="fullName" required></div>
        <div class="form-field"><label for="phone">Phone number</label><input id="phone" required placeholder="03XX-XXXXXXX"></div>
        <div class="form-field full"><label for="address">Street address</label><input id="address" required></div>
        <div class="form-field"><label for="city">City</label><input id="city" required></div>
        <div class="form-field"><label for="postal">Postal code</label><input id="postal"></div>
        <div class="form-field full"><label for="email">Email (for order updates)</label><input id="email" type="email" required></div>
        <div class="form-field full"><label for="notes">Order notes (optional)</label><textarea id="notes" rows="3"></textarea></div>
      </div>
      <h3>Payment</h3>
      <div class="form-field">
        <label style="display:flex;align-items:center;gap:8px;flex-direction:row;font-family:var(--font-body);text-transform:none;">
          <input type="radio" name="payment" value="cod" checked style="width:auto;"> Cash on delivery
        </label>
        <label style="display:flex;align-items:center;gap:8px;flex-direction:row;font-family:var(--font-body);text-transform:none;">
          <input type="radio" name="payment" value="bank" style="width:auto;"> Bank transfer (details sent by email)
        </label>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Place Order</button>
    </form>

    <aside class="summary-card" id="checkoutSummary"></aside>
  </section>
</main>

<div id="qf-footer"></div>

<script type="module">
  import { injectLayout } from "./assets/js/components.js";
  import { getCart, saveCart, cartTotal, formatPKR, placeOrder, toast } from "./assets/js/app.js";

  injectLayout();

  const cart = getCart();
  const subtotal = cartTotal(cart);
  const delivery = subtotal > 0 && subtotal < 3000 ? 250 : 0;
  const total = subtotal + delivery;

  const summaryEl = document.getElementById("checkoutSummary");
  if (!cart.length) {
    document.getElementById("checkoutRoot").innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h2>Your cart is empty</h2><a class="btn btn-primary" href="shop.html">Browse fabric</a></div>`;
  } else {
    summaryEl.innerHTML = `
      <h3 style="margin-top:0;">Order Summary</h3>
      ${cart.map(i => `<div class="summary-row"><span>${i.name} × ${i.qty}</span><span>${formatPKR(i.price*i.qty)}</span></div>`).join("")}
      <div class="summary-row"><span>Delivery</span><span>${delivery?formatPKR(delivery):"Free"}</span></div>
      <div class="summary-row total"><span>Total</span><span>${formatPKR(total)}</span></div>
    `;
  }

  document.getElementById("checkoutForm")?.addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector("button[type=submit]");
    btn.disabled = true; btn.textContent = "Placing order…";
    const customer = {
      name: document.getElementById("fullName").value,
      phone: document.getElementById("phone").value,
      address: document.getElementById("address").value,
      city: document.getElementById("city").value,
      postal: document.getElementById("postal").value,
      email: document.getElementById("email").value,
      notes: document.getElementById("notes").value,
      payment: document.querySelector("input[name=payment]:checked").value
    };
    try {
      const orderId = await placeOrder({ items: cart, total, customer });
      saveCart([]);
      document.getElementById("checkoutRoot").innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <h2>Order placed — thank you, ${customer.name.split(" ")[0]}.</h2>
          <p>Your order reference is <strong>${orderId}</strong>. We'll confirm by phone or email before dispatch.</p>
          <a class="btn btn-primary" href="shop.html">Continue shopping</a>
        </div>`;
    } catch (err) {
      console.error(err);
      toast("Couldn't place order — check your Firebase setup and try again.");
      btn.disabled = false; btn.textContent = "Place Order";
    }
  });
</script>
</body>
</html>
